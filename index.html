<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banded — The Social Gig Diary</title>
    <meta name="description" content="Banded is the social gig diary. Log every show, rate the experience, and share your live music history.">
    <meta property="og:title" content="Banded — The Social Gig Diary">
    <meta property="og:description" content="Every show you've ever been to. Log gigs, rate performances, follow friends.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://banded.uk">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #080810;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            text-align: center;
        }

        .wordmark {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #FFFFFF 0%, #8B9DC3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 20px;
            color: #8B9DC3;
            max-width: 440px;
            margin-bottom: 48px;
            line-height: 1.5;
        }

        /* Email signup */
        .signup-form {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            width: 100%;
            max-width: 420px;
        }

        .signup-form input[type="email"] {
            flex: 1;
            padding: 14px 18px;
            border-radius: 10px;
            border: 1px solid rgba(139, 157, 195, 0.25);
            background: rgba(255, 255, 255, 0.05);
            color: #FFFFFF;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .signup-form input[type="email"]::placeholder {
            color: #8B9DC3;
        }

        .signup-form input[type="email"]:focus {
            border-color: #3B82F6;
        }

        .signup-form button {
            padding: 14px 24px;
            border-radius: 10px;
            border: none;
            background: #3B82F6;
            color: #FFFFFF;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .signup-form button:hover {
            background: #2563EB;
        }

        .signup-note {
            font-size: 13px;
            color: #8B9DC3;
            margin-bottom: 48px;
        }

        /* App Store badge area */
        .app-store {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .badge-placeholder {
            width: 160px;
            height: 54px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            opacity: 0.45;
        }

        .badge-placeholder svg {
            width: 24px;
            height: 24px;
            fill: #FFFFFF;
        }

        .badge-placeholder span {
            font-size: 14px;
            font-weight: 500;
            color: #FFFFFF;
        }

        .coming-soon {
            font-size: 13px;
            color: #8B9DC3;
        }

        /* Footer */
        footer {
            padding: 24px;
            text-align: center;
            border-top: 1px solid rgba(139, 157, 195, 0.1);
            font-size: 14px;
            color: #8B9DC3;
        }

        footer a {
            color: #8B9DC3;
            text-decoration: none;
            transition: color 0.2s;
        }

        footer a:hover { color: #FFFFFF; }

        .footer-links {
            margin-bottom: 12px;
        }

        .footer-links a + a::before {
            content: ' \00B7 ';
            margin: 0 8px;
        }

        @media (max-width: 480px) {
            .wordmark { font-size: 48px; }
            .tagline { font-size: 17px; }
            .signup-form {
                flex-direction: column;
            }
            .signup-form button {
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <main>
        <div class="wordmark">Banded</div>
        <p class="tagline">The social gig diary. Every show you've ever been to.</p>

        <form class="signup-form" action="mailto:hello@banded.uk" method="get" enctype="text/plain">
            <input type="email" name="email" placeholder="you@email.com" required autocomplete="email">
            <button type="submit">Get early access</button>
        </form>
        <p class="signup-note">We'll let you know when Banded launches.</p>

        <div class="app-store">
            <div class="badge-placeholder">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
                <span>App Store</span>
            </div>
            <p class="coming-soon">Coming soon</p>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="/privacy">Privacy Policy</a>
            <a href="/support">Support</a>
            <a href="mailto:hello@banded.uk">hello@banded.uk</a>
        </div>
        <p>&copy; 2026 Banded</p>
    </footer>
</body>
</html>
